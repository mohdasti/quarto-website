format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: 
      - assets/css/main.css
    include-in-header: 
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
          <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
          <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
          <link rel="stylesheet" href="/assets/listing-default.css">
    include-after-body:
      text: |
        <div id="reading-progress-bar" aria-hidden="true"></div>
        <script>
        (function() {
          var bar = document.getElementById('reading-progress-bar');
          if (!bar) return;
          function updateBar() {
            var scrollTop = window.scrollY || document.documentElement.scrollTop;
            var docHeight = document.documentElement.scrollHeight - window.innerHeight;
            var pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
            bar.style.width = Math.min(pct, 100) + '%';
          }
          window.addEventListener('scroll', updateBar, { passive: true });
          updateBar();
        })();
        </script>
    toc: true
    code-fold: true
    lightbox: true
    
execute:
  freeze: auto